<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog — Agent Foundry</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script src="icons.js"></script>
</head>
<body>
  <nav>
    <div class="container">
      <a href="index.html" class="logo">
        <span class="logo-icon">AF</span>
        Agent Foundry
      </a>
      <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="nav-links">
        <a href="catalog.html" class="nav-link active">Catalog</a>
      <a href="graph.html" class="nav-link">Graph</a>
        <a href="audit.html" class="nav-link">Audit</a>
      </div>
      <span class="spacer"></span>
      <a href="https://github.com/youcisla/Agent-Foundry" class="gh-stars" target="_blank" rel="noopener">GitHub</a>
    </div>
  </nav>

  <div style="padding: 60px 0 32px;">
    <div class="container">
      <h1 style="font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;">Catalog</h1>
      <p class="section-sub" style="margin: 0;">All <span id="cat-total">--</span> skills and <span id="cat-agents">--</span> agents. Click a card to preview it in place.</p>
    </div>
  </div>

  <div class="container" style="padding-bottom: 60px;">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="icon"><span class="icon-svg">search</span></span>
        <input type="search" id="search" placeholder="Filter by name, description, or trigger phrase…" autocomplete="off">
      </div>
      <div class="filter-cats" role="tablist" aria-label="Filter by category">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="core">Core <span class="cnt" id="cat-core-count">0</span></button>
        <button class="filter-btn" data-cat="optional">Optional <span class="cnt" id="cat-opt-count">0</span></button>
      </div>
      <span class="filter-count" id="visible-count"></span>
    </div>

    <h2 style="font-size: 16px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 32px 0 16px;">Agents</h2>
    <div class="skill-grid" id="agents-grid"></div>

    <h2 style="font-size: 16px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 32px 0 16px;">Core skills</h2>
    <div class="skill-grid" id="core-grid"></div>

    <h2 style="font-size: 16px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 32px 0 16px;">Optional skills</h2>
    <div class="skill-grid" id="opt-grid"></div>
  </div>

  <footer>
    <div class="container">
      <div>Agent Foundry — MIT License · Built by <a href="https://github.com/youcisla">Youcisla</a></div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="site-data.js"></script>
  <script src="store.js"></script>
  <script src="skill-deps.js"></script>
  <script>
    function cardHTML(item, isAgent) {
      const repoUrl = 'https://github.com/youcisla/Agent-Foundry';
      const path = isAgent
        ? `agents/${item.id}/AGENT.md`
        : (item.category === 'core' ? `skills/core/${item.id}/SKILL.md` : `skills/optional/${item.id}/SKILL.md`);
      const deps = isAgent ? [] : (SKILL_DEPS[item.id] || []);
      const depsHtml = deps.length
        ? `<div class="meta" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-soft);"><span style="color: var(--text-faint); font-size: 11px; margin-right: 6px;">references</span>${deps.map(d => `<a href="catalog.html#${d}" class="dep-chip" onclick="event.stopPropagation()">${d}</a>`).join('')}</div>`
        : '';
      return `<div class="skill-card" style="text-decoration:none; color:inherit; display:block;cursor:pointer" onclick="showSkillPreview('${item.id}')">
        <h3><span class="name">${item.name}</span><span class="id">${item.id}</span></h3>
        <div class="desc">${item.description}</div>
        <div class="meta">
          <span class="tag ${isAgent ? 'tag-agent' : (item.category === 'core' ? 'tag-core' : 'tag-opt')}">${isAgent ? 'agent' : item.category}</span>
          ${isAgent ? `<span>${item.model}</span>` : `<span>${item.lines} lines</span>`}
          <span>${item.version}</span>
          <span style="margin-left:auto;color:var(--accent);font-size:11px;font-weight:500">Preview →</span>
        </div>
        ${depsHtml}
      </div>`;
    }

    const coreGrid = document.getElementById('core-grid');
    const optGrid = document.getElementById('opt-grid');
    const agentsGrid = document.getElementById('agents-grid');

    let currentCat = 'all';
    const searchInput = document.getElementById('search');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const visibleCount = document.getElementById('visible-count');

    function applyFilter() {
      const st = AFStore.get();
      const skills = st.skills, agents = st.agents;
      const q = searchInput.value.toLowerCase().trim();
      const matches = (s) => {
        if (currentCat !== 'all' && s.category !== currentCat) return false;
        if (!q) return true;
        return (s.name + ' ' + s.id + ' ' + s.description).toLowerCase().includes(q);
      };
      const filteredCore = skills.filter(s => s.category === 'core' && matches(s));
      const filteredOpt = skills.filter(s => s.category === 'optional' && matches(s));
      const filteredAgents = agents.filter(a => {
        if (currentCat !== 'all' && currentCat !== 'agents') return false;
        if (!q) return true;
        return (a.name + ' ' + a.id + ' ' + a.description).toLowerCase().includes(q);
      });
      coreGrid.innerHTML = filteredCore.map(s => cardHTML(s, false)).join('') || '<div style="color: var(--text-faint)">No matching skills.</div>';
      optGrid.innerHTML = filteredOpt.map(s => cardHTML(s, false)).join('') || '<div style="color: var(--text-faint)">No matching skills.</div>';
      agentsGrid.innerHTML = filteredAgents.map(a => cardHTML(a, true)).join('') || '<div style="color: var(--text-faint)">No matching agents.</div>';
      const total = filteredCore.length + filteredOpt.length + filteredAgents.length;
      visibleCount.textContent = `${total} of ${st.skillCount + st.agentCount}`;
    }

    // Render everything driven by the reactive store, so the catalog re-renders
    // automatically when skills/agents change (no manual refresh).
    function render() {
      const st = AFStore.get();
      document.getElementById('cat-total').textContent = st.skillCount;
      document.getElementById('cat-agents').textContent = st.agentCount;
      document.getElementById('cat-core-count').textContent = st.skills.filter(s => s.category === 'core').length;
      document.getElementById('cat-opt-count').textContent = st.skills.filter(s => s.category === 'optional').length;
      applyFilter();
    }

    filterBtns.forEach(b => b.addEventListener('click', () => {
      filterBtns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentCat = b.dataset.cat;
      applyFilter();
    }));
    searchInput.addEventListener('input', applyFilter);

    render();
    AFStore.subscribe(() => {           // live update: flash the count, re-render
      render();
      visibleCount.classList.remove('flash'); void visibleCount.offsetWidth;
      visibleCount.classList.add('flash');
    });
    AFStore.startLive({ dataUrl: 'data.json' });

    // Skill preview modal
    function showSkillPreview(id) {
      const st = AFStore.get();
      const item = st.skills.find(s => s.id === id) || st.agents.find(a => a.id === id);
      if (!item || !item.body_md) return;
      const panel = document.createElement('div');
      panel.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center';
      panel.onclick = e => { if (e.target === panel) panel.remove(); };
      const inner = document.createElement('div');
      inner.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-width:680px;max-height:80vh;overflow-y:auto;padding:28px 32px;margin:20px';
      const close = document.createElement('button');
      close.innerHTML = (window.ICONS ? ICONS.close : '✕'); close.setAttribute('aria-label','Close'); close.style.cssText = 'float:right;background:none;border:none;color:var(--text-faint);cursor:pointer;display:inline-flex';
      close.onclick = () => panel.remove();
      inner.appendChild(close);
      const h = document.createElement('h2'); h.textContent = item.name; h.style.marginBottom = '8px';
      inner.appendChild(h);
      const desc = document.createElement('p'); desc.textContent = item.description; desc.style.color = 'var(--text-dim)'; desc.style.fontSize = '14px'; desc.style.marginBottom = '16px';
      inner.appendChild(desc);
      const body = document.createElement('div');
      body.innerHTML = marked.parse(atob(item.body_md));
      body.style.cssText = 'font-size:13px;line-height:1.6;color:var(--text-dim)';
      body.querySelectorAll('pre').forEach(el => { el.style.cssText = 'background:var(--bg-elev);border:1px solid var(--border);border-radius:6px;padding:10px 12px;overflow-x:auto;font-size:11px'; });
      inner.appendChild(body);
      panel.appendChild(inner);
      document.body.appendChild(panel);
    }
    window.showSkillPreview = showSkillPreview;
  </script>
<script src="context-menu.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.icon-svg').forEach(function(el) {
    var name = el.textContent.trim();
    if (window.ICONS && ICONS[name]) {
      el.innerHTML = ICONS[name];
    }
  });
});
</script>
</body>
</html>
