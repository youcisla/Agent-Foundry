<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph — Agent Foundry</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- React Flow (XYFlow) styles + brand overrides -->
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12/dist/style.css">
  <link rel="stylesheet" href="graph-app/graph.css">
  <!-- Import map: one shared React instance for our code AND React Flow (external) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12?external=react,react-dom",
      "htm": "https://esm.sh/htm@3.1.1",
      "zustand/vanilla": "https://esm.sh/zustand@4.5.5/vanilla"
    }
  }
  </script>
  <script src="icons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <nav>
    <div class="container">
      <a href="index.html" class="logo"><span class="logo-icon">AF</span> Agent Foundry</a>
      <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu"><span class="icon-svg">menu</span></button>
      <div class="nav-links">
        <a href="why.html" class="nav-link">Why</a>
        <a href="catalog.html" class="nav-link">Catalog</a>
        <a href="graph.html" class="nav-link" style="color:var(--text)">Graph</a>
        <a href="audit.html" class="nav-link">Audit</a>
      </div>
      <span class="spacer"></span>
      <a href="https://github.com/youcisla/Agent-Foundry" class="gh-stars" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg> GitHub</a>
    </div>
  </nav>

  <div style="padding:32px 0 16px">
    <div class="container">
      <h1>Knowledge Graph</h1>
      <p style="color:var(--text-dim);font-size:14px" id="graph-header-stats">396 nodes · 626 edges · 44 communities · interactive canvas</p>
    </div>
  </div>

  <div class="container" style="padding-bottom:44px">
    <!-- React Flow (XYFlow) mounts here -->
    <div id="graph-root">
      <div class="gp-loading"><span class="gp-spinner"></span> Loading knowledge graph…</div>
    </div>
    <p style="color:var(--text-faint);font-size:12px;margin-top:10px">
      Drag to pan · scroll to zoom · click a node for details and source · toggle <strong>Orchestration</strong> to watch a prompt travel the pipeline.
    </p>
  </div>

  <!-- In-app file / markdown viewer (opened from node inspectors) -->
  <div class="doc-viewer" id="doc-viewer" aria-hidden="true">
    <div class="doc-panel" role="dialog" aria-modal="true">
      <div class="doc-head">
        <span class="doc-path" id="doc-path"></span>
        <div class="doc-actions">
          <a class="btn btn-sm" id="doc-gh" target="_blank" rel="noopener"><span class="icon-svg">github</span> Source</a>
          <button class="btn btn-sm" id="doc-copy"><span class="icon-svg">clipboard</span> Copy</button>
          <button class="doc-close" id="doc-close" aria-label="Close"><span class="icon-svg">close</span></button>
        </div>
      </div>
      <div class="doc-body" id="doc-body"></div>
    </div>
  </div>

  <!-- Embedded source for the in-app viewer (no GitHub redirect) -->
  <script src="file-content.js"></script>
  <script>
    const repoUrl = "https://github.com/youcisla/Agent-Foundry/blob/main/";
    const escapeHtml = (s) => s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const viewer = document.getElementById("doc-viewer");
    let currentDocPath = "";
    window.openFile = function openFile(path, displayName) {
      const entry = (typeof FILE_CONTENT !== "undefined") && FILE_CONTENT[path];
      currentDocPath = path;
      document.getElementById("doc-path").textContent = displayName || path;
      document.getElementById("doc-gh").href = repoUrl + path;
      const body = document.getElementById("doc-body");
      if (!entry) {
        body.innerHTML = '<p style="color:var(--text-dim)">Preview unavailable for this file. Use <strong>Source</strong> to view it on GitHub.</p>';
      } else {
        let raw;
        try { raw = decodeURIComponent(escape(atob(entry.b64))); } catch (e) { raw = atob(entry.b64); }
        if (entry.ext === ".md") { body.className = "doc-body markdown"; body.innerHTML = marked.parse(raw); }
        else { body.className = "doc-body"; body.innerHTML = '<pre class="code-view"><code>' + escapeHtml(raw) + "</code></pre>"; }
      }
      viewer.classList.add("open");
      viewer.setAttribute("aria-hidden", "false");
    };
    function closeDoc() { viewer.classList.remove("open"); viewer.setAttribute("aria-hidden", "true"); }
    document.getElementById("doc-close").addEventListener("click", closeDoc);
    viewer.addEventListener("click", e => { if (e.target === viewer) closeDoc(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape" && viewer.classList.contains("open")) closeDoc(); });
    document.getElementById("doc-copy").addEventListener("click", function () {
      const entry = FILE_CONTENT && FILE_CONTENT[currentDocPath];
      if (!entry) return;
      let raw; try { raw = decodeURIComponent(escape(atob(entry.b64))); } catch (e) { raw = atob(entry.b64); }
      navigator.clipboard.writeText(raw);
      this.innerHTML = '<span class="icon-svg">check</span> Copied';
      window.ICONS && (this.querySelector('.icon-svg').innerHTML = ICONS.check);
      setTimeout(() => { this.innerHTML = '<span class="icon-svg">clipboard</span> Copy'; window.ICONS && (this.querySelector('.icon-svg').innerHTML = ICONS.clipboard); }, 1500);
    });
  </script>

  <!-- React Flow app (browser-native ESM, no build step) -->
  <script type="module" src="graph-app/main.js"></script>
  <script>
    // Watchdog: if the CDN-hosted bundle can't load, show a graceful fallback.
    setTimeout(function () {
      if (window.__afGraphLoaded) return;
      var el = document.getElementById("graph-root");
      if (el && !el.querySelector(".react-flow") && !el.querySelector(".gp-fatal")) {
        el.innerHTML = '<div class="gp-fatal"><strong>Interactive graph could not load.</strong>' +
          '<span>The React Flow bundle loads from a CDN (esm.sh) and needs network access. ' +
          'View the source on <a href="https://github.com/youcisla/Agent-Foundry" target="_blank" rel="noopener">GitHub</a>.</span></div>';
      }
    }, 9000);
  </script>

  <!-- Resolve static icon-svg placeholders (nav, doc viewer) -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.icon-svg').forEach(function (el) {
        var name = el.textContent.trim();
        if (window.ICONS && ICONS[name] && !el.querySelector('svg')) el.innerHTML = ICONS[name];
      });
    });
  </script>
  <script src="context-menu.js"></script>
</body>
</html>
