<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph — Agent Foundry</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="icons.js"></script>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <nav>
    <div class="container">
      <a href="index.html" class="logo"><span class="logo-icon">AF</span> Agent Foundry</a>
      <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="why.html" class="nav-link">Why</a>
        <a href="catalog.html" class="nav-link">Catalog</a>
        <a href="graph.html" class="nav-link" style="color:var(--text)">Graph</a>
        <a href="audit.html" class="nav-link">Audit</a>
      </div>
      <span class="spacer"></span>
      <a href="https://github.com/youcisla/Agent-Foundry" class="gh-stars" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg> GitHub</a>
    </div>
  </nav>

  <div style="padding:32px 0 20px">
    <div class="container">
      <h1>Knowledge Graph</h1>
      <p style="color:var(--text-dim);font-size:14px" id="graph-header-stats">396 nodes · 626 edges · 44 communities</p>
    </div>
  </div>

  <div class="container">
    <div class="graph-layout">
      <!-- Sidebar: search + file tree + jump buttons -->
      <div class="graph-sidebar">
        <div class="search-wrap" style="margin-bottom:10px;position:relative">
          <span class="icon" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-faint)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" id="graph-search" placeholder="Search nodes…" style="padding-left:32px" />
        </div>
        <div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="focusNode('create_app()')">create_app</button>
          <button class="btn btn-sm" onclick="focusNode('Config')">Config</button>
          <button class="btn btn-sm" onclick="focusNode('rank_skills()')">rank_skills</button>
          <button class="btn btn-sm" onclick="focusNode('plan()')">plan</button>
        </div>
        <div style="margin-bottom:8px;font-size:12px;color:var(--text-dim);display:flex;gap:6px;align-items:center">
          <span class="icon-svg">folder</span> <span>Files</span>
        </div>
        <div class="file-tree" id="file-tree-root"></div>
      </div>

      <!-- Graph canvas -->
      <div class="graph-canvas">
        <div id="network"></div>
        <div class="graph-controls">
          <button class="btn btn-sm" onclick="network.fit()">⊞ Fit</button>
          <button class="btn btn-sm" onclick="var p=network.physics.options.enabled;network.setOptions({physics:{enabled:!p}});this.textContent=p?'▶ Resume':'⏸ Pause'">⏸ Pause</button>
          <button class="btn btn-sm" onclick="exportPNG()">⬇ PNG</button>
        </div>
        <div class="graph-info">
          <h4>Legend</h4>
          <div>🟠 Node = code symbol</div>
          <div>🔗 Edge = call/import/reference</div>
          <div style="margin-top:4px;color:var(--text-faint);font-size:10px">Click a node → details + file</div>
        </div>
        <!-- Node detail panel -->
        <div class="node-panel" id="node-panel">
          <button class="close" onclick="closeNodePanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          <h3 id="np-title"></h3>
          <div id="np-details"></div>
          <div id="np-connections" style="margin:8px 0;font-size:12px;color:var(--text-dim)"></div>
          <div id="np-md-preview" class="md-preview"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="site-data.js"></script>
  <script src="graph-data.js"></script>
  <script src="graph-stats.js"></script>
  <script src="file-tree.js"></script>
  <script>
    const repoUrl = "https://github.com/youcisla/Agent-Foundry/blob/main/";
    const nodes = new vis.DataSet(GRAPH_NODES.map(n => ({
      id: n.id, label: n.label, title: n.title, group: n.group,
      file: n.file || "",
      shape: "dot", size: 8 + Math.min(n.id.length * 0.3, 12),
      borderWidth: 1, color: { background: "#f5a623", border: "#2a2a33", highlight: { background: "#ff6b35", border: "#f5a623" } },
      font: { color: "#8b8b95", size: 10, strokeWidth: 0 },
    })));
    const edges = new vis.DataSet(GRAPH_EDGES.map(e => ({
      from: e.from, to: e.to, label: e.label,
      arrows: "to", color: { color: "#2a2a33", highlight: "#f5a623" },
      font: { color: "#5b5b65", size: 8, strokeWidth: 0 },
      width: 1,
    })));

    const container = document.getElementById("network");
    const data = { nodes, edges };
    const options = {
      physics: { solver: "forceAtlas2Based", forceAtlas2Based: { gravitationalConstant: -40, springLength: 120, springConstant: 0.01 }, stabilization: { iterations: 200 } },
      interaction: { hover: true, tooltipDelay: 200, navigationButtons: false, keyboard: true },
      nodes: { borderWidth: 1, borderWidthSelected: 2 },
      edges: { smooth: { type: "continuous" } },
    };
    const network = new vis.Network(container, data, options);

    // Search
    document.getElementById("graph-search").addEventListener("input", function() {
      const q = this.value.toLowerCase();
      nodes.forEach(n => {
        const match = n.label.toLowerCase().includes(q);
        nodes.update({ id: n.id, opacity: q ? (match ? 1 : 0.08) : 1 });
        if (match) network.selectNodes([n.id]);
      });
    });

    // Click node → detail panel
    network.on("click", function(params) {
      if (params.nodes.length === 0) { closeNodePanel(); return; }
      const nid = params.nodes[0];
      const node = nodes.get(nid);
      const panel = document.getElementById("node-panel");
      panel.classList.add("open");
      document.getElementById("np-title").textContent = node.label;

      const connectedEdges = GRAPH_EDGES.filter(e => e.from === nid || e.to === nid);
      const connections = connectedEdges.map(e => {
        const other = e.from === nid ? e.to : e.from;
        return `${other} (${e.label})`;
      }).join("<br>");

      let details = '<div class="detail-row"><span class="dt">Symbol:</span> ' + node.label + '</div>';
      if (node.file) details += '<div class="detail-row"><span class="dt">File:</span> <a href="' + repoUrl + node.file + '" target="_blank">' + node.file + '</a></div>';
      details += '<div class="detail-row"><span class="dt">Group:</span> ' + node.group + '</div>';
      details += '<div class="detail-row"><span class="dt">Degree:</span> ' + connectedEdges.length + '</div>';
      document.getElementById("np-details").innerHTML = details;
      document.getElementById("np-connections").innerHTML = connections ? '<strong>Connections:</strong><br>' + connections : '<em>No connections</em>';

      const matchSkill = SKILLS.find(s => node.label.toLowerCase().includes(s.id));
      const matchAgent = AGENTS.find(a => node.label.toLowerCase().includes(a.id));
      let mdHtml = "";
      if (matchSkill) {
        mdHtml = "<h4>Skill preview</h4>" + marked.parse(atob(matchSkill.body_md));
      } else if (matchAgent) {
        mdHtml = "<h4>Agent preview</h4>" + marked.parse(atob(matchAgent.body_md));
      }
      document.getElementById("np-md-preview").innerHTML = mdHtml;

      const connectedIds = new Set(connectedEdges.flatMap(e => [e.from, e.to]));
      nodes.forEach(n => {
        const m = n.id === nid || connectedIds.has(n.id);
        nodes.update({ id: n.id, opacity: m ? 1 : 0.12 });
      });
    });

    function closeNodePanel() {
      document.getElementById("node-panel").classList.remove("open");
      nodes.forEach(n => nodes.update({ id: n.id, opacity: 1 }));
    }
    window.closeNodePanel = closeNodePanel;

    function focusNode(label) {
      const found = GRAPH_NODES.find(n => n.label === label);
      if (found) { network.focus(found.id, { scale: 1.5, animation: true }); network.selectNodes([found.id]); }
    }
    window.focusNode = focusNode;

    function exportPNG() {
      const c = document.querySelector("#network canvas");
      if (c) { const a = document.createElement("a"); a.href = c.toDataURL("image/png"); a.download = "agent-foundry-graph.png"; a.click(); }
    }
    window.exportPNG = exportPNG;

    // Build file tree
    function renderTree(obj, parentEl) {
      for (const [key, val] of Object.entries(obj)) {
        if (key === "__files") continue;
        if (val.__files) {
          const d = document.createElement("details");
          const s = document.createElement("summary");
          s.innerHTML = '<span class="icon-svg">folder</span> ' + key + '/';
          d.appendChild(s);
          const inner = document.createElement("div");
          renderTree(val.__files, inner);
          d.appendChild(inner);
          parentEl.appendChild(d);
        } else if (val.path) {
          const a = document.createElement("a");
          a.className = "fentry";
          a.innerHTML = '<span class="icon-svg">file</span> ' + key;
          a.href = repoUrl + val.path;
          a.target = "_blank";
          parentEl.appendChild(a);
        }
      }
    }
    renderTree(FILE_TREE, document.getElementById("file-tree-root"));

    // Stats
    if (typeof GRAPH_STATS !== 'undefined') {
      document.getElementById("graph-header-stats").textContent =
        GRAPH_STATS.node_count + ' nodes · ' + GRAPH_STATS.edge_count + ' edges · ' + GRAPH_STATS.community_count + ' communities';
    }
  </script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.icon-svg').forEach(function(el) {
      var name = el.textContent.trim();
      if (window.ICONS && ICONS[name]) el.innerHTML = ICONS[name];
    });
  });
  </script>
<div id="af-context-menu" onclick="this.style.display='none'">
  <div class="cm-item" onclick="window.history.back()">← Back</div>
  <div class="cm-item" onclick="location.reload()">↻ Reload</div>
  <div class="cm-sep"></div>
  <div class="cm-item" onclick="navigator.clipboard.writeText('Agent Foundry — '+document.title+'\\n'+location.href);this.closest('#af-context-menu').style.display='none'">📋 Copy page info</div>
  <div class="cm-item" onclick="window.open('https://github.com/youcisla/Agent-Foundry','_blank')">Open on GitHub</div>
</div>
<script>
document.addEventListener('contextmenu',function(e){e.preventDefault();var m=document.getElementById('af-context-menu');if(!m)return;m.style.display='block';m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';m.style.top=Math.min(e.clientY,window.innerHeight-160)+'px'});
document.addEventListener('click',function(){var m=document.getElementById('af-context-menu');if(m)m.style.display='none'});
</script>
</body>
</html>
