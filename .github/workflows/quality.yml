name: quality
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: NO_EXTERNAL_REFS gate
        run: bash scripts/nox.sh
      - name: Skill lint
        run: bash scripts/validate.sh
      - name: Quality eval
        run: python3 scripts/foundry-eval.py
